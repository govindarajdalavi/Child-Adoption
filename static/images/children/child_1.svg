<svg viewBox="0 0 200 220" 
     xmlns="http://www.w3.org/2000/svg"
     width="200" height="220">
  
  <!-- Background circle -->
  <circle cx="100" cy="120" r="90" 
    fill="rgba(227, 242, 253, 0.6)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="215" rx="45" ry="7" 
    fill="rgba(0,0,0,0.1)"/>
  
  <!-- LEGS (sitting) -->
  <path d="M75 170 Q70 210 90 205" fill="none" stroke="#d4935e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M125 170 Q130 210 110 205" fill="none" stroke="#d4935e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shorts (dark blue) -->
  <path d="M65 170 Q100 185 135 170 L125 185 Q100 190 75 185 Z" fill="#0d47a1"/>
  
  <!-- PROP (Cricket Bat) - under arm -->
  <g transform="translate(60, 130) rotate(-15)">
    <rect x="0" y="20" width="12" height="50" rx="3" fill="#eecaab"/>
    <rect x="3" y="0" width="6" height="20" rx="1" fill="#8d6e63"/>
    <path d="M0 65 L12 65 L10 70 L2 70 Z" fill="#eecaab"/>
    <!-- Bat grip strips -->
    <line x1="3" y1="5" x2="9" y2="5" stroke="#5d4037" stroke-width="1"/>
    <line x1="3" y1="10" x2="9" y2="10" stroke="#5d4037" stroke-width="1"/>
    <line x1="3" y1="15" x2="9" y2="15" stroke="#5d4037" stroke-width="1"/>
  </g>
  
  <!-- BODY / CLOTHES (blue striped shirt) -->
  <path d="M65 120 Q100 135 135 120 L135 170 Q100 180 65 170 Z" fill="#1565c0"/>
  <!-- Stripes -->
  <path d="M80 125 Q80 150 78 173" stroke="#90caf9" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M100 128 L100 176" stroke="#90caf9" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M120 125 Q120 150 122 173" stroke="#90caf9" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- NECK -->
  <rect x="92" y="110" width="16" height="20" fill="#c07a45"/>
  
  <!-- ARMS -->
  <!-- Left Arm holding bat -->
  <path d="M65 125 Q50 150 65 160" fill="none" stroke="#d4935e" stroke-width="12" stroke-linecap="round"/>
  <!-- Right Arm resting -->
  <path d="M135 125 Q150 150 135 160" fill="none" stroke="#d4935e" stroke-width="12" stroke-linecap="round"/>
  <!-- Sleeves -->
  <path d="M60 120 L48 145 L62 148 L70 125 Z" fill="#1565c0"/>
  <path d="M140 120 L152 145 L138 148 L130 125 Z" fill="#1565c0"/>
  
  <!-- HANDS -->
  <circle cx="65" cy="160" r="7" fill="#d4935e"/>
  <circle cx="135" cy="160" r="7" fill="#d4935e"/>
  
  <!-- HEAD -->
  <circle cx="100" cy="85" r="42" fill="#d4935e"/>
  
  <!-- EARS -->
  <circle cx="58" cy="88" r="11" fill="#d4935e"/>
  <circle cx="142" cy="88" r="11" fill="#d4935e"/>
  <!-- Inner ear detail -->
  <path d="M55 85 Q50 88 55 92" stroke="#c07a45" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M145 85 Q150 88 145 92" stroke="#c07a45" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- HAIR (Short neat black hair) -->
  <path d="M58 80 Q55 45 100 40 Q145 45 142 80 Q135 60 100 50 Q65 60 58 80" fill="#1a1a1a"/>
  <!-- Hair sheen -->
  <path d="M80 48 Q100 43 120 48 Q110 46 90 46" stroke="#333333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M90 53 Q100 50 110 53 Q100 51 90 53" stroke="#333333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- EYES -->
  <circle cx="85" cy="85" r="10" fill="white"/>
  <circle cx="115" cy="85" r="10" fill="white"/>
  <circle cx="85" cy="85" r="7" fill="#4e342e"/>
  <circle cx="115" cy="85" r="7" fill="#4e342e"/>
  <circle cx="85" cy="85" r="4" fill="#1a1a1a"/>
  <circle cx="115" cy="85" r="4" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="88" cy="82" r="2.5" fill="white"/>
  <circle cx="118" cy="82" r="2.5" fill="white"/>
  
  <!-- EYEBROWS -->
  <path d="M75 73 Q85 69 93 73" stroke="#4e342e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M107 73 Q115 69 125 73" stroke="#4e342e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- NOSE -->
  <circle cx="100" cy="95" r="4" fill="#c07a45"/>
  
  <!-- MOUTH (happy smile) -->
  <path d="M85 105 Q100 118 115 105" stroke="#5d4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile lines -->
  <path d="M82 102 Q84 105 85 105" stroke="#5d4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M118 102 Q116 105 115 105" stroke="#5d4037" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- CHEEKS -->
  <circle cx="73" cy="97" r="9" fill="rgba(255,150,100,0.35)"/>
  <circle cx="127" cy="97" r="9" fill="rgba(255,150,100,0.35)"/>
  
</svg>
